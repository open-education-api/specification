type: object
description: A relationship between a person object and an offering
required:
  - role
  - state
properties:
  primaryCode:
    description: |
      The primary human readable identifier for this association. This is often the source identifier as defined by the institution.
      For OEAPI 6.x this attribute is not required. For OEAPI 7.x this attribute may become required.
    $ref: './IdentifierEntry.yaml'
    example:
      codeType: identifier
      code: "2.1"
  role:
    $ref: '../enumerations/associationRole.yaml'
  startDateTime:
    type:
      - string
      - 'null'
    format: date-time
    description: The start date and time the person is intended to start participating in the offering. Formatted according to RFC3339 (full-date)
    example: '2025-01-01T08:30:00+01:00'
  expectedEndDateTime:
    type:
      - string
      - 'null'
    format: date-time
    description: The expected end date and time the person is intended to stop participating in the offering. Formatted according to RFC3339 (date-time)
    example: '2025-10-25T08:30:00+01:00'
  actualEndDateTime:
    type:
      - string
      - 'null'
    format: date-time
    description: The actual end date and time the person stopped participating in the offering. Formatted according to RFC3339 (full-date)
    example: '2025-10-23T08:30:00+01:00'
  otherCodes:
    type:
      - array
      - 'null'
    description: An array of additional human readable codes/identifiers for the entity being described.
    items:
      $ref: './IdentifierEntry.yaml'
  state:
    $ref: '../enumerations/associationState.yaml'
#    readOnly: true
  remoteState:
#    writeOnly: true
    oneOf:
      - $ref: '../enumerations/remoteAssociationState.yaml'
      - type: 'null'
  consumer:
    oneOf:
      - $ref: './Consumer.yaml'
      - type: 'null'
  ext:
    oneOf:
      - $ref: './Ext.yaml'
      - type: 'null'
