# Automatically re-approve a PR when it was already approved
# and only CHANGELOG.md changed after the last approval.

name: Auto re-approve when only CHANGELOG changed

on:
  pull_request_target:
    types: [synchronize, reopened, ready_for_review]

# Required to read PR metadata and submit an approval review.
permissions:
  contents: read
  pull-requests: write

jobs:
  reapprove:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false

    steps:
      # 1) Create a GitHub App installation token.
      - name: Create GitHub App installation token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.OEAPI_APP_PUBLISH_CLIENT_ID }}
          private-key: ${{ secrets.OEAPI_APP_PUBLISH_SECRET }}
          owner: open-education-api
          repositories: |
            specification

      # 2) Check whether only CHANGELOG.md changed since the last approval.
      #    This uses the GitHub compare API instead of checking out PR code.
      - name: Check and re-approve if only CHANGELOG changed
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          # Only these files may change without requiring a new human review.
          ALLOWED_REGEX='^CHANGELOG\.md$'

          echo "PR: ${PR}"
          echo "HEAD_SHA: ${HEAD_SHA}"

          # Retrieve the commit SHA of the most recent APPROVED review.
          APPROVED_COMMIT="$(
            gh api "/repos/${REPO}/pulls/${PR}/reviews?per_page=100" \
              --jq '
                [.[] | select(.state == "APPROVED")]
                | sort_by(.submitted_at)
                | last
                | .commit_id // empty
              '
          )"

          # If no approval exists yet, do nothing.
          if [ -z "${APPROVED_COMMIT}" ]; then
            echo "No previous approval found."
            exit 0
          fi

          echo "Last approved commit: ${APPROVED_COMMIT}"

          # Determine which files changed since the last approval.
          FILES_CHANGED="$(
            gh api "/repos/${REPO}/compare/${APPROVED_COMMIT}...${HEAD_SHA}" \
              --jq '.files[].filename'
          )"

          # If no changes occurred after approval, do nothing.
          if [ -z "${FILES_CHANGED}" ]; then
            echo "No files changed after approval."
            exit 0
          fi

          echo "Files changed after approval:"
          echo "${FILES_CHANGED}"

          # If any file outside the allow-list changed, do not re-approve.
          if echo "${FILES_CHANGED}" | grep -qEv "${ALLOWED_REGEX}"; then
            echo "Files outside allow-list changed. Not re-approving."
            exit 0
          fi

          # Only CHANGELOG.md changed since the last approval: submit approval.
          echo "Only CHANGELOG.md changed. Re-approving."

          gh api -X POST "/repos/${REPO}/pulls/${PR}/reviews" \
            -f commit_id="${HEAD_SHA}" \
            -f event="APPROVE" \
            -f body="Auto re-approve: only CHANGELOG.md changed since the last approval."