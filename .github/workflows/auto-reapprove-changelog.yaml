name: Auto re-approve if only CHANGELOG changed after approval

on:
  pull_request_target:
    types: [synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  reapprove:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false

    steps:
      - name: Create GitHub App installation token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.OOAPI_APP_PUBLISH_ID }}
          private-key: ${{ secrets.OOAPI_APP_PUBLISH_SECRET }}
          owner: open-education-api
          repositories: |
            specification

      # Checkout PR head (safe: we only do git diff, we do not execute PR code)
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Decide whether to re-approve
        id: decide
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # Latest APPROVED review commit (most recent approval wins)
          APPROVED_COMMIT="$(gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/${REPO}/pulls/${PR_NUMBER}/reviews?per_page=100" \
            --jq '[.[] | select(.state=="APPROVED")][0].commit_id')"

          if [ -z "${APPROVED_COMMIT}" ] || [ "${APPROVED_COMMIT}" = "null" ]; then
            echo "No approvals found; nothing to do."
            echo "should_approve=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CHANGED_FILES="$(git diff --name-only "${APPROVED_COMMIT}..HEAD" || true)"

          if [ -z "${CHANGED_FILES}" ]; then
            echo "No changes since approval; nothing to do."
            echo "should_approve=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Changed files since last approval:"
          echo "${CHANGED_FILES}"

          # Allow-list: ONLY these paths may have changed since approval
          ALLOWED_REGEX='^(CHANGELOG\.md)$'

          DISALLOWED="$(echo "${CHANGED_FILES}" | grep -Ev "${ALLOWED_REGEX}" || true)"

          if [ -n "${DISALLOWED}" ]; then
            echo "Disallowed changes found since approval (will NOT re-approve):"
            echo "${DISALLOWED}"
            echo "should_approve=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Only changelog changes detected since approval -> will re-approve."
          echo "should_approve=true" >> "$GITHUB_OUTPUT"

      - name: Submit approval review
        if: steps.decide.outputs.should_approve == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh api -X POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${REPO}/pulls/${PR_NUMBER}/reviews" \
            -f event="APPROVE" \
            -f body="Auto re-approve: only CHANGELOG.md changed since last approval."
