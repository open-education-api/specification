# Automatically re-approve a PR when it was already approved
# and only CHANGELOG.md changed after the last approval.

name: Auto re-approve when only CHANGELOG changed

'on':
  pull_request_target:
    types: [synchronize, reopened, ready_for_review]

# Required to read PR metadata and submit an approval review.
permissions:
  contents: read
  pull-requests: write

jobs:
  reapprove:
    runs-on: ubuntu-latest
    if: ${{ github.event.pull_request.draft == false }}

    steps:
      # 1) Create a GitHub App installation token.
      - name: Create GitHub App installation token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.OEAPI_APP_PUBLISH_CLIENT_ID }}
          private-key: ${{ secrets.OEAPI_APP_PUBLISH_SECRET }}
          owner: open-education-api
          repositories: |
            specification

      # 2) Checkout the PR HEAD commit.
      #    Only git diff is executed; no PR code is run.
      - name: Checkout PR head
        uses: actions/checkout@v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      # 3) Check whether only CHANGELOG.md changed since the last approval.
      #    This uses the GitHub GraphQL API, PR files API and local git diff.
      - name: Check and re-approve if only CHANGELOG changed
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          # Only these files may change without requiring a new human review.
          ALLOWED_REGEX='^CHANGELOG\.md$'

          # Retrieve the commit SHA of the most recent dismissed approval.
          APPROVED_COMMIT="$(
            gh api graphql \
              -F owner="${OWNER}" \
              -F name="${REPO_NAME}" \
              -F number="${PR}" \
              -f query='
                query($owner: String!, $name: String!, $number: Int!) {
                  repository(owner: $owner, name: $name) {
                    pullRequest(number: $number) {
                      timelineItems(last: 100, itemTypes: [REVIEW_DISMISSED_EVENT]) {
                        nodes {
                          ... on ReviewDismissedEvent {
                            createdAt
                            previousReviewState
                            review {
                              commit {
                                oid
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              ' \
              --jq '
                [
                  .data.repository.pullRequest.timelineItems.nodes[]
                  | select(.previousReviewState == "APPROVED")
                  | select(.review.commit.oid != null)
                ]
                | sort_by(.createdAt)
                | last
                | .review.commit.oid // empty
              '
          )"

          # If no previous approval exists, do nothing.
          if [ -z "${APPROVED_COMMIT}" ]; then
            echo "No previous approval found."
            exit 0
          fi

          echo "Last approved commit: ${APPROVED_COMMIT}"

          # Determine which PR files changed since the last approval.
          FILES_CHANGED="$(
            git diff --name-only "${APPROVED_COMMIT}..HEAD" -- \
              $(gh api "repos/${REPO}/pulls/${PR}/files?per_page=100" --jq '.[].filename')
          )"

          # If no PR files changed after approval, do nothing.
          if [ -z "${FILES_CHANGED}" ]; then
            echo "No PR files changed after approval."
            exit 0
          fi

          echo "PR files changed since approval:"
          echo "${FILES_CHANGED}"

          # If any file outside the allow-list changed, do not re-approve.
          if echo "${FILES_CHANGED}" | grep -qEv "${ALLOWED_REGEX}"; then
            echo "Files outside allow-list changed. Not re-approving."
            exit 0
          fi

          # Only CHANGELOG.md changed since the last approval: submit approval.
          gh api -X POST "/repos/${REPO}/pulls/${PR}/reviews" \
            -f commit_id="${HEAD_SHA}" \
            -f event="APPROVE" \
            -f body="Auto re-approve: only CHANGELOG.md changed since last approval."
            