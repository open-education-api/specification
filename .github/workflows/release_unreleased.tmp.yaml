name: Publish unreleased specification

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      # 0) Create an installation token for the publishing GitHub App.
      #    This token must be used for ALL pushes (both this repo and the publication repo).
      - name: Create GitHub App installation token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.OOAPI_APP_PUBLISH_ID }}
          private-key: ${{ secrets.OOAPI_APP_PUBLISH_SECRET }}
          owner: open-education-api
          repositories: |
            specification
            open-education-api.github.io

      # 1) Checkout this repository (the repo where the tag was created).
      #    - fetch-depth: 0 ensures full history + tags exist locally.
      - name: Checkout source repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
      
      # 2) Setup Node for running build_oeapi.js.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "latest"

      # 5) Build release YAML, release JSON and zudoku documentation
      - name: Build (bundle + docs)
        run: |
          set -euo pipefail
          node build_oeapi.js source/spec.yaml oeapi.json oeapi.yaml oeapi.zudoku.json /specification/unreleased

      # 6) Checkout the publication repository into ./target
      #    so we can copy files into it and push changes.
      - name: Checkout publication repository (open-education-api.github.io)
        uses: actions/checkout@v4
        with:
          repository: open-education-api/open-education-api.github.io
          token: ${{ steps.app-token.outputs.token }}
          path: target

      # 7) Sync specification source to the publication repo.
      - name: Sync specification -> publication repo (specification/vX.Y)
        run: |
          set -euo pipefail
          rsync -a --delete "dist/specification/unreleased/" "target/specification/unreleased/"
          rsync -a --delete "source/" "target/specification/unreleased/source/"
          rsync -a oeapi.json oeapi.yaml "target/specification/unreleased/"

      # 8) Commit and push only if there are changes in the publication repo.
      - name: Commit and push publication repo changes (if any)
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          cd target

          git remote set-url origin "https://x-access-token:${APP_TOKEN}@github.com/open-education-api/open-education-api.github.io.git"

          if git status --porcelain | grep -q .; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "Publish specification for tmp -> specification/unreleased/"
            git push
          else
            echo "No changes to publish."
          fi
