# This workflow lints the OpenAPI source specification used to build the OEAPI spec.

name: Lint Vacuum

on:
#  pull_request:
#    branches:
#      - "release/*"
#      - "main"
  workflow_dispatch:

# This workflow only reads repository contents and PR metadata.
# It does not commit, tag, publish, or modify anything.
permissions:
  contents: read
  pull-requests: read

jobs:
  lint-source-vacuum:
    runs-on: ubuntu-latest

    steps:
      # Check out the repository so the runner has access to:
      # - source/spec.yaml
      # - vacuum.conf.yaml
      # - .spectral.yaml
      #
      # fetch-depth: 0 avoids edge cases with PRs that include merge commits
      # or cherry-picks, even though this job is read-only.
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # If source/ does not exist but v5/ does, this is a valid legacy layout.
      # In that case we skip linting successfully.
      - name: Check source layout
        run: |
          if [ ! -d "source" ] && [ -d "v5" ]; then
            echo "source/ not present, v5/ detected, skipping lint"
            exit 0
          fi

          if [ ! -d "source" ]; then
            echo "::error::source/ directory not found."
            exit 1
          fi

      # Install Vacuum using Go.
      - name: Install Vacuum
        run: |
          go install github.com/daveshanley/vacuum/cmd/vacuum@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      # Run Vacuum using the repository configuration and Spectral rules.
      - name: Lint OpenAPI specification
        run: |
          vacuum lint \
            --config vacuum.conf.yaml \
            --ruleset .spectral.yaml \
            source/spec.yaml