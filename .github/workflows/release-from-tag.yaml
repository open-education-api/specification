# This workflow publishes an OEAPI specification when a version tag
# (vX.Y or vX.Y-rcZ) is pushed.

name: Publish specification on tag (vX.Y / vX.Y-rcZ)

on:
  push:
    tags:
      - "v*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      # 0) Create an installation token for the publishing GitHub App.
      #    This token must be used for ALL pushes (both this repo and the publication repo).
      - name: Create GitHub App installation token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.OOAPI_APP_PUBLISH_ID }}
          private-key: ${{ secrets.OOAPI_APP_PUBLISH_SECRET }}
          owner: open-education-api
          repositories: |
            specification
            open-education-api.github.io

      # 1) Checkout this repository (the repo where the tag was created).
      #    - fetch-depth: 0 ensures full history + tags exist locally.
      - name: Checkout source repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
      
      # 2) Setup Node for running build_oeapi.js.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "latest"

      # 3) Parse the tag name and derive, release, publish root, etc
      - name: Determine variables for version, release, etc
        id: ver
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"   # e.g. v6.0, v6.0-rc1, v6.0-rc2
          # Accept vX.Y or vX.Y-rcZ (rcZ can be any text after '-')
          if [[ ! "$TAG" =~ ^v([0-9]+)\.([0-9]+)(-(.+))?$ ]]; then
            echo "Unsupported tag format: $TAG (expected vX.Y or vX.Y-rcZ)"
            exit 1
          fi

          MAJOR="${BASH_REMATCH[1]}"
          MINOR="${BASH_REMATCH[2]}"
          SERIES="${MAJOR}.${MINOR}"     # X.Y

          # Specialities for version v5
          if [[ "$MAJOR" == "5" ]]; then
            SITE_PATH="specification/v5"
            SOURCE_FOLDER="v5"
            SPECIFICATION="v5/spec.yaml"
          else
            SITE_PATH="specification/v${SERIES}"
            SOURCE_FOLDER="source"
            SPECIFICATION="source/spec.yaml"
          fi
          echo "SOURCE_FOLDER=$SOURCE_FOLDER" >> "$GITHUB_ENV"
          echo "SPECIFICATION=$SPECIFICATION" >> "$GITHUB_ENV"
          echo "SITE_PATH=${SITE_PATH}" >> "$GITHUB_ENV"
          echo "BRANCH=release/${SERIES}" >> "$GITHUB_ENV"

      # 4) Ensure the tag commit belongs to main or release/*
      - name: Validate tag origin branch (main vs release/X.Y)
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          git fetch --prune origin "+refs/heads/*:refs/remotes/origin/*"
          TAG_COMMIT="$(git rev-list -n 1 "${GITHUB_REF_NAME}")"

          if git show-ref --verify --quiet "refs/remotes/origin/$BRANCH"; then
            git branch -r --contains "$TAG_COMMIT" | grep -Eq "origin/${BRANCH}$" || { echo "Tag ${GITHUB_REF_NAME} must be on ${BRANCH}"; exit 1; }
          else
            git branch -r --contains "$TAG_COMMIT" | grep -Eq "origin/main$" || { echo "Tag ${GITHUB_REF_NAME} must be on main (will create ${BRANCH})"; exit 1; }
            echo "Creating branch $BRANCH from tag ${GITHUB_REF_NAME}"
            git remote set-url origin "https://x-access-token:${APP_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
            git branch "$BRANCH" "${GITHUB_REF_NAME}"
            git push origin "$BRANCH"
          fi

      # 5) Build release YAML, release JSON and zudoku documentation
      - name: Build (bundle + docs)
        run: |
          set -euo pipefail
          node build_oeapi.js "$SPECIFICATION" oeapi.json oeapi.yaml oeapi.zudoku.json "/$SITE_PATH"

      # 6) Checkout the publication repository into ./target
      #    so we can copy files into it and push changes.
      - name: Checkout publication repository (open-education-api.github.io)
        uses: actions/checkout@v4
        with:
          repository: open-education-api/open-education-api.github.io
          token: ${{ steps.app-token.outputs.token }}
          path: target

      # 7) Sync specification source to the publication repo.
      - name: Sync specification -> publication repo (specification/vX.Y)
        run: |
          set -euo pipefail
          mkdir -p "target/$SITE_PATH"
          rsync -a --delete "dist/${SITE_PATH}/" "target/${SITE_PATH}/"
          rsync -a --delete "${SOURCE_FOLDER}/" "target/${SITE_PATH}/source/"
          rsync -a oeapi.json oeapi.yaml "target/${SITE_PATH}/"

      # 8) Commit and push only if there are changes in the publication repo.
      - name: Commit and push publication repo changes (if any)
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          cd target

          git remote set-url origin "https://x-access-token:${APP_TOKEN}@github.com/open-education-api/open-education-api.github.io.git"

          if git status --porcelain | grep -q .; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "Publish specification for ${GITHUB_REF_NAME} -> ${SITE_PATH}"
            git push
          else
            echo "No changes to publish."
          fi

      # 9) Create a GitHub Release in specification (this) repo for the tag.
      #    - tag_name selects the existing tag
      #    - name sets the release title (equal to vX.Y or vX.Y-rcZ)
      #    - generate_release_notes lets GitHub produce notes automatically
      - name: Create GitHub Release for this tag (with assets)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: false
          files: |
            oeapi.yaml
            oeapi.json

      # 10) Add release yaml and json to release branch
      - name: Commit generated files to release branch
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail

          git remote set-url origin "https://x-access-token:${APP_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --prune origin "+refs/heads/*:refs/remotes/origin/*"

          git switch -C "$BRANCH" "origin/$BRANCH"

          git add oeapi.yaml oeapi.json oeapi.zudoku.json
          git commit -m "Add generated files for ${GITHUB_REF_NAME}" || exit 0
          git push
